apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: postgres-hpa
  namespace: hm-shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       postgres
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 85
