apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: hm-shop
type: Opaque
# Values are base64 encoded:
# hmuser     = echo -n "hmuser"    | base64  → aG11c2Vy
# hmpassword = echo -n "hmpassword"| base64  → aG1wYXNzd29yZA==
# hmshop     = echo -n "hmshop"   | base64  → aG1zaG9w
data:
  POSTGRES_USER:     aG11c2Vy
  POSTGRES_PASSWORD: aG1wYXNzd29yZA==
  POSTGRES_DB:       aG1zaG9w
